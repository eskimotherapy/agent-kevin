<!doctype html>
<!--
  Agent OS dashboard shell. html-render.ts fills the {{TOKEN}} slots with
  pre-escaped HTML; everything static (layout, CSS, client JS) lives here.
  Hard rule: zero external requests — system fonts, no CDN, no analytics.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>{{EMOJI}}</text></svg>">
<style>
:root {
  --bg: #0d1117;
  --side: #0a0e14;
  --panel: #161b22;
  --panel-2: #1d242e;
  --border: #2b323c;
  --hairline: rgba(48, 54, 61, 0.55);
  --text: #c9d1d9;
  --dim: #8b949e;
  --accent: #ffd866;
  --green: #3fb950;
  --amber: #d29922;
  --red: #f85149;
  --cyan: #56d4dd;
  --blue: #79c0ff;
  --magenta: #d2a8ff;
  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, 'Cascadia Mono', monospace;
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0; display: flex; min-height: 100vh;
  background: var(--bg); color: var(--text);
  font: 14px/1.55 var(--mono);
  -webkit-font-smoothing: antialiased;
}
a { color: var(--cyan); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── sidebar ───────────────────────────────────────────────────────── */
aside {
  width: 216px; flex: none; background: var(--side);
  border-right: 1px solid var(--border);
  position: sticky; top: 0; height: 100vh;
  display: flex; flex-direction: column;
}
.side-banner { padding: 18px 18px 14px; border-bottom: 1px solid var(--border); }
.wordmark { margin: 0; color: var(--accent); font-size: 11px; line-height: 1.3; white-space: pre; }
.tagline { color: var(--cyan); font-size: 12px; margin-top: 6px; font-weight: 600; }
.tagline .ver { color: var(--dim); font-weight: normal; }
.dateline { color: var(--dim); font-size: 11px; margin-top: 4px; word-break: break-all; }
/* Location links: inherit the surrounding color, underline only on hover. */
a.plink { color: inherit; text-decoration: none; }
a.plink:hover { text-decoration: underline; text-underline-offset: 3px; }
aside nav { flex: 1; overflow-y: auto; padding: 10px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; margin: 1px 0; border-radius: 7px;
  color: var(--dim); font-size: 13px; cursor: pointer; user-select: none;
}
.nav-item:hover { color: var(--text); background: rgba(29, 36, 46, 0.6); text-decoration: none; }
.nav-item.active { background: var(--panel-2); color: var(--accent); }
.nav-item .ico { width: 20px; text-align: center; flex: none; }
.side-foot { padding: 12px 14px 16px; border-top: 1px solid var(--border); display: grid; gap: 10px; }
.op-card { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.op-card img, .op-card .op-fallback {
  width: 30px; height: 30px; border-radius: 50%; object-fit: cover; flex: none;
  border: 1px solid var(--border);
}
.op-card .op-fallback { display: inline-flex; align-items: center; justify-content: center; background: var(--panel-2); }
.op-card .op-name { font-size: 13px; }
.op-card .op-tz { color: var(--dim); font-size: 11px; }
.badge {
  display: inline-flex; align-items: center; gap: 8px; justify-content: center;
  border: 1px solid var(--border); border-radius: 999px;
  padding: 5px 12px; font-size: 11px; letter-spacing: 0.04em;
  background: var(--panel); cursor: pointer; white-space: nowrap;
}
.badge.ok { color: var(--green); border-color: rgba(63, 185, 80, 0.4); }
.badge.warn { color: var(--amber); border-color: rgba(210, 153, 34, 0.5); }
.badge .pulse { width: 7px; height: 7px; border-radius: 50%; background: currentColor; animation: pulse 2.4s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

/* ── main ──────────────────────────────────────────────────────────── */
main { flex: 1; min-width: 0; padding: 30px 38px 70px; }
.page { display: none; max-width: 980px; }
.page.active { display: block; }
.page > h1 { margin: 0; font-size: 24px; }
.page > h1 .accent { color: var(--accent); }
.page > .sub { color: var(--dim); margin: 4px 0 0; font-size: 13px; }

/* ── stat strip ────────────────────────────────────────────────────── */
.statstrip {
  display: flex; flex-wrap: wrap; gap: 8px 34px;
  margin: 20px 0 4px; padding: 14px 20px;
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
}
.stat .num { font-size: 21px; font-weight: 600; color: var(--text); }
.stat .num.bad { color: var(--red); }
.stat .num.warn { color: var(--amber); }
.stat .num.good { color: var(--green); }
.stat .lab { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }

/* ── sections ──────────────────────────────────────────────────────── */
.section { margin: 26px 0; }
.section > h2 {
  display: flex; align-items: center; gap: 12px; margin: 0 0 8px;
  color: var(--accent); font-size: 12px; font-weight: 600;
  letter-spacing: 0.07em; text-transform: uppercase;
}
.section > h2 i { flex: 1; height: 1px; background: var(--border); }
.section > h2 .right { color: var(--dim); font-weight: normal; text-transform: none; letter-spacing: 0; font-size: 12px; }
.hint { color: var(--dim); font-style: italic; padding: 4px 0; }

/* ── rows ──────────────────────────────────────────────────────────── */
.row { display: flex; align-items: baseline; gap: 12px; padding: 7px 2px; border-bottom: 1px solid var(--hairline); }
.row:last-child { border-bottom: none; }
.row .grow { flex: 1; min-width: 0; }
.row .dim, .dim { color: var(--dim); }
.good { color: var(--green); }
.warn { color: var(--amber); }
.bad { color: var(--red); }
.chip {
  background: var(--panel-2); border-radius: 4px;
  padding: 2px 8px; font-size: 11px; color: var(--dim); white-space: nowrap; flex: none;
}
a.chip:hover { color: var(--cyan); text-decoration: none; }
.chip.proj i { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.nowrap { white-space: nowrap; }
td .nowrap a, td a { white-space: nowrap; }
/* In-page routing links (status page → the surface a signal lives on). */
.navlink { color: var(--cyan); cursor: pointer; white-space: nowrap; flex: none; font-size: 12px; }
.navlink:hover { text-decoration: underline; }

/* ── sub-tabs ──────────────────────────────────────────────────────── */
.subtabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin: 18px 0 6px; overflow-x: auto; }
.subtab {
  background: none; border: none; cursor: pointer; font: 600 12px var(--mono);
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 8px 13px; color: var(--dim); border-bottom: 2px solid transparent; white-space: nowrap;
}
.subtab:hover { color: var(--text); }
.subtab.active { color: var(--accent); border-bottom-color: var(--accent); }
[data-subpanel] { display: none; }
[data-subpanel].active { display: block; }

/* ── tasks ─────────────────────────────────────────────────────────── */
.filter {
  width: 100%; margin: 10px 0 6px; padding: 7px 12px;
  background: var(--panel); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); font: 13px var(--mono); outline: none;
}
.filter:focus { border-color: var(--accent); }
details.task { border-bottom: 1px solid var(--hairline); }
details.task:last-child { border-bottom: none; }
details.task summary { display: flex; align-items: baseline; gap: 10px; padding: 7px 2px; cursor: pointer; list-style: none; }
details.task summary::-webkit-details-marker { display: none; }
details.task summary:hover { background: rgba(29, 36, 46, 0.5); }
details.task .tid { flex: none; min-width: 62px; }
details.task .tid a { color: var(--accent); }
details.task .ttl { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
details.task[open] .ttl { white-space: normal; }
details.task .meta { flex: none; font-size: 12px; color: var(--dim); }
details.task .meta.bad { color: var(--red); }
details.task .meta.warn { color: var(--amber); }
details.task .pri { flex: none; font-size: 11px; padding: 2px 8px; border-radius: 999px; background: var(--panel-2); color: var(--dim); }
details.task .pri.p0 { color: var(--red); }
details.task .pri.p1 { color: var(--amber); }
details.task .taskbody { padding: 2px 2px 10px 72px; color: var(--dim); font-size: 12px; }
h3.group { margin: 18px 0 2px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--dim); }
h3.group:first-of-type { margin-top: 8px; }
h3.group.date { color: var(--accent); }

/* ── goal cards ────────────────────────────────────────────────────── */
.goalcard {
  background: rgba(255, 216, 102, 0.03);
  border: 2px dotted rgba(255, 216, 102, 0.35);
  border-radius: 12px;
  padding: 14px 18px 15px; margin: 12px 0;
}
.goalcard h3.group { margin: 0 0 4px; color: var(--accent); }
.goalcard .gicon { margin-right: 8px; }
.goalcard ul.plain { margin-top: 2px; }
.goalcard .hint { padding: 2px 0; }

/* ── project cards ─────────────────────────────────────────────────── */
details.projcard {
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  margin: 12px 0; overflow: hidden;
}
details.projcard summary { list-style: none; cursor: pointer; padding: 14px 18px; }
details.projcard summary::-webkit-details-marker { display: none; }
details.projcard summary:hover { background: var(--panel-2); }
details.projcard[open] summary { border-bottom: 1px solid var(--border); }
.proj-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
.proj-dot { width: 10px; height: 10px; border-radius: 50%; flex: none; align-self: center; }
.proj-name { font-size: 15px; font-weight: 600; }
.proj-counts { font-size: 12px; }
.proj-meta { margin-left: auto; font-size: 12px; }
.proj-desc { color: var(--dim); font-size: 12px; margin-top: 6px; }
.proj-progress { display: flex; align-items: center; gap: 12px; margin-top: 10px; font-size: 12px; }
.proj-progress .track { flex: 1; height: 6px; background: var(--panel-2); border-radius: 3px; overflow: hidden; }
.proj-progress .track span { display: block; height: 100%; border-radius: 3px; }
.proj-tasks { padding: 6px 18px 14px; }

/* ── log tail ──────────────────────────────────────────────────────── */
pre.logtail {
  background: var(--side); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 16px; margin: 6px 0 0;
  max-height: 62vh; overflow: auto;
  font-size: 11px; line-height: 1.5; color: var(--dim);
  white-space: pre-wrap; word-break: break-all;
}

/* ── tiles ─────────────────────────────────────────────────────────── */
.tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(235px, 1fr)); gap: 12px; margin-top: 10px; }
.tile { background: var(--panel); border: 1px solid var(--border); border-radius: 9px; padding: 12px 14px; }
.tile .tname { font-size: 13px; }
.tile .tname .ico { margin-right: 7px; }
.tile .tdesc { color: var(--dim); font-size: 12px; margin-top: 5px; line-height: 1.45; }

/* ── bars / charts ─────────────────────────────────────────────────── */
.flexbar { display: flex; height: 10px; border-radius: 5px; overflow: hidden; background: var(--panel-2); margin: 10px 0 6px; }
.flexbar span { min-width: 2px; }
.legend { display: flex; flex-wrap: wrap; gap: 4px 14px; font-size: 12px; color: var(--dim); }
.legend i { width: 8px; height: 8px; border-radius: 2px; display: inline-block; margin-right: 5px; }
.magrow { display: flex; align-items: center; gap: 10px; padding: 3px 0; }
.magrow .lbl { width: 120px; flex: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.magrow .track { flex: 1; height: 8px; background: var(--panel-2); border-radius: 4px; overflow: hidden; display: flex; }
.magrow .val { color: var(--dim); font-size: 12px; flex: none; min-width: 58px; text-align: right; }

/* ── tables ────────────────────────────────────────────────────────── */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; color: var(--dim); font-weight: normal; font-size: 11px; text-transform: uppercase;
     letter-spacing: 0.06em; padding: 4px 10px 6px 0; border-bottom: 1px solid var(--border); }
td { padding: 6px 10px 6px 0; border-bottom: 1px solid var(--hairline); vertical-align: top; }
tr:last-child td { border-bottom: none; }

/* ── persona / profile ─────────────────────────────────────────────── */
.persona-head { display: flex; align-items: center; gap: 20px; margin: 22px 0 6px; }
.persona-head img { width: 88px; height: 88px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
.persona-head .p-name { font-size: 22px; font-weight: 600; }
.persona-head .p-kind { color: var(--dim); font-size: 13px; margin-top: 2px; }
.persona-head .p-vibe { color: var(--text); font-size: 13px; margin-top: 6px; max-width: 640px; }
.bio { color: var(--text); max-width: 760px; }
ul.plain { margin: 6px 0 0; padding-left: 20px; }
ul.plain li { padding: 3px 0; }

/* ── sessions ──────────────────────────────────────────────────────── */
.sess-turns { color: var(--dim); font-size: 11px; min-width: 64px; }
.sess-cwd { margin-top: 3px; font-size: 11px; color: var(--dim); }

.chip.auto { color: var(--green); }

footer { margin-top: 44px; color: var(--dim); font-size: 12px; }
footer .sep { margin: 0 8px; opacity: 0.5; }

@media (max-width: 760px) {
  body { flex-direction: column; }
  aside { width: 100%; height: auto; position: static; }
  aside nav { display: flex; overflow-x: auto; padding: 6px 10px; }
  .nav-item { flex: none; }
  .side-foot { display: none; }
  main { padding: 20px 16px 50px; }
  details.task .taskbody { padding-left: 4px; }
}
</style>
</head>
<body>
<aside>
  <div class="side-banner">
{{BANNER}}
  </div>
  <nav>
{{NAV}}
  </nav>
  <div class="side-foot">
{{SIDEFOOT}}
  </div>
</aside>
<main>
{{PAGES}}
<footer>{{FOOTER}}</footer>
</main>
<script>
(() => {
  'use strict';
  const pages = Array.from(document.querySelectorAll('.page'));
  const navItems = Array.from(document.querySelectorAll('.nav-item'));
  const valid = new Set(pages.map((p) => p.dataset.page));
  const first = pages[0]?.dataset.page;

  // Sub-tabs: buttons toggle sibling panels within their tab group.
  document.querySelectorAll('[data-tabgroup]').forEach((group) => {
    const buttons = Array.from(group.querySelectorAll('.subtab'));
    const panels = Array.from(group.querySelectorAll('[data-subpanel]'));
    buttons.forEach((button) => {
      button.addEventListener('click', () => {
        buttons.forEach((b) => b.classList.toggle('active', b === button));
        panels.forEach((p) => p.classList.toggle('active', p.dataset.subpanel === button.dataset.subtab));
      });
    });
  });

  // Routing: "page" activates a page, "page/subtab" also picks its sub-tab.
  const show = (name) => {
    const page = valid.has(name) ? name : first;
    pages.forEach((p) => p.classList.toggle('active', p.dataset.page === page));
    navItems.forEach((a) => a.classList.toggle('active', a.dataset.nav === page));
  };
  const open = (spec) => {
    const [name, sub] = (spec || '').split('/');
    show(name);
    if (!sub) return;
    const active = document.querySelector('.page.active');
    active?.querySelectorAll('.subtab').forEach((button) => {
      if (button.dataset.subtab === sub) button.click();
    });
  };
  // Click-driven (not <a href="#…">): Obsidian's HTML viewer swallows anchor
  // navigation, so nav items are plain elements routed by hand. The hash is
  // still mirrored, best-effort, for browser deep links.
  const goto = (spec) => {
    open(spec);
    try {
      history.replaceState(null, '', '#' + spec);
    } catch {}
  };
  document.querySelectorAll('[data-nav]').forEach((el) => {
    el.addEventListener('click', () => goto(el.dataset.nav));
  });
  const fromHash = () => open(location.hash.replace('#', ''));
  window.addEventListener('hashchange', fromHash);
  fromHash();

  // Text filter: narrows [data-row] elements within the same filterbox.
  document.querySelectorAll('input.filter').forEach((input) => {
    const box = input.closest('[data-filterbox]');
    if (!box) return;
    input.addEventListener('input', () => {
      const q = input.value.trim().toLowerCase();
      box.querySelectorAll('[data-row]').forEach((row) => {
        row.style.display = !q || row.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    });
  });

})();
</script>
</body>
</html>
